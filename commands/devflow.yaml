name: devflow
description: Run the full DevFlow pipeline (intent -> spec -> plan -> code -> tests -> security -> PR) for a request.
argument_hint: "<request: an idea, bug, feature, or new project>"
run:
  cli: devflow run
  args: "$ARGUMENTS"
  capture_output: false
allowed_shell:
  - "devflow:*"
  - "git:*"
  - "gh:*"
body: |
  You are the DevFlow orchestrator's thin command layer. The user's request is provided as the argument.

  Run the DevFlow pipeline by executing this terminal command from the project root:

  ```
  devflow run "<REQUEST>"
  ```

  Replace `<REQUEST>` with the user's full request text (the argument). The `devflow` CLI drives every stage itself (Intent Classification, Repository Harness, SpecKit, Requirement Validation, BMAD planning, Context7 + code gathering, Coding, Static Validation, Playwright/Maestro, Strix security, Documentation, and GitHub PR).

  While it runs:
  - Stream the CLI output to the user.
  - If the pipeline halts at **intake**, the request needs more detail. Either:
    - Ask the user the printed questions in chat, then resume with an enriched request, OR
    - Tell the user to run: `devflow run --resume <id> --from intake --interactive`
  - If another gate fails, report the failure and the resume command; do not bypass gates.
  - When it finishes, share the PR URL and the run summary.

  For vague new-project requests, prefer running with interactive intake first:
  `devflow run --interactive "<REQUEST>"`

  Do not re-implement the pipeline yourself; just invoke the CLI and relay results.

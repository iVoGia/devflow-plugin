name: devflow-init
description: Initialize DevFlow in this project (scaffold config, knowledge harness, and IDE commands).
argument_hint: ""
run:
  cli: devflow init
  args: ""
  capture_output: false
allowed_shell:
  - "devflow:*"
body: |
  Initialize DevFlow in the current project by running:

  ```
  devflow init
  ```

  This scaffolds `.devflow/config.yaml`, the knowledge harness under `.devflow/knowledge/` (business.md, architecture.md, coding-rules.md), and regenerates the slash commands for Cursor, Claude Code and GitHub Copilot.

  After it runs, DevFlow will **auto-install** missing workflow tools (SpecKit, Strix, gh, Maestro when configured) and report any failures or manual steps (agent CLI, Docker, `gh auth login`, env keys).

  Tell the user to fill in the three knowledge files. If anything could not be installed automatically, show the error and suggest `devflow doctor`.
